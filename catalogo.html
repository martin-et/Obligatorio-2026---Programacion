<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Catálogo de equipos fotográficos" />
    <title>Catálogo - Equipos Fotográficos</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <nav class="barra-nav-catalogo">
      <div class="nav-contenido-catalogo">
        <div class="nav-logo"><a href="index.html">FotoMartín</a></div>
        <ul class="nav-enlaces">
          <li><a href="index.html">Home</a></li>
          <li><a href="catalogo.html">Catálogo</a></li>
          <li><a href="contacto.html">Contacto</a></li>
        </ul>
        <div class="nav-acciones">
          <div class="carrito-svg">
            <svg
              width="25"
              height="25"
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M6.29977 5H21L19 12H7.37671M20 16H8L6 3H3M9 20C9 20.5523 8.55228 21 8 21C7.44772 21 7 20.5523 7 20C7 19.4477 7.44772 19 8 19C8.55228 19 9 19.4477 9 20ZM20 20C20 20.5523 19.5523 21 19 21C18.4477 21 18 20.5523 18 20C18 19.4477 18.4477 19 19 19C19.5523 19 20 19.4477 20 20Z"
                stroke="#ffffff"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
            </svg>
            <span class="carrito-cantidad" id="carritoCantidad"></span>
          </div>
        </div>
      </div>
    </nav>

    <main class="main-catalogo">
      <section class="contenedor-catalogo">
        <h1 id="h1Catalogo"></h1>
        <div class="catalogo-flex">
          <div class="filtros" id="filtros">
            <input
              type="text"
              name=""
              class="txt-filtro"
              id="txtFiltro"
              placeholder="Canon"
            />
            <select
              name=""
              class="select-filtro-marcas"
              id="selectFiltroMarcas"
            ></select>

            <div class="radio-input">
              <label for="" class="label-categoria">Categoria:</label>
              <label class="label">
                <input type="radio" name="radioCategoria" value="" checked />
                <span class="text">Todos</span>
              </label>
              <label class="label">
                <input type="radio" name="radioCategoria" value="Camaras" />
                <span class="text">Cámaras</span>
              </label>
              <label class="label">
                <input type="radio" name="radioCategoria" value="Lentes" />
                <span class="text">Lentes</span>
              </label>
              <label class="label">
                <input type="radio" name="radioCategoria" value="Tripodes" />
                <span class="text">Tripodes</span>
              </label>
              <label class="label">
                <input type="radio" name="radioCategoria" value="Flashes" />
                <span class="text">Flashes</span>
              </label>
              <label class="label">
                <input type="radio" name="radioCategoria" value="Gimbals" />
                <span class="text">Gimbals</span>
              </label>

              <div class="filtro-destacados">
                <label for="" class="label-categoria">En Oferta:</label>
                <label class="label">
                  <input type="radio" name="radioOferta" value="" checked />
                  <span class="text">Todos</span>
                </label>
                <label class="label">
                  <input type="radio" name="radioOferta" value="true" />
                  <span class="text">Si</span>
                </label>
                <label class="label">
                  <input type="radio" name="radioOferta" value="false" />
                  <span class="text">No</span>
                </label>
              </div>
            </div>
            <div class="buttons-catalogo">
              <button class="btn-limpiar" id="btnLimpiar">Limpiar Filtros</button>
              <!-- <a href="catalogo.html">Volver al inicio</a> -->
            </div>
          </div>
          <div class="productos-grid" id="productosGrid"></div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer-pagina">
      <div class="footer-contenedor">
        <a href="index.html" class="footer-logo">FotoMartín</a>
        <div class="footer-derechos">
          <p>&copy; 2026 <strong>FotoMartín.</strong></p>
          <p>Todos los derechos reservados.</p>
        </div>
      </div>
    </footer>
    <script src="js/productos.js"></script>
    <script src="js/catalogo.js"></script>
  </body>
</html>
